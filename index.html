<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Financial Data Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans','Segoe UI',sans-serif;transition:background .3s,color .3s}
body.light{--bg:#eae8e3;--bg2:#e2e0db;--tx:#1a1a2e;--tx2:rgba(0,0,0,.55);--bd:rgba(0,0,0,.06);--sh:rgba(0,0,0,.06);--hd:linear-gradient(135deg,#1a1a2e,#16213e);--ht:#e8e6e1;--ub:linear-gradient(135deg,#1a1a2e,#16213e);--ut:#e8e6e1;--ab:#f8f7f4;--at:#1a1a2e;--tb:#1a1a2e;--tt:#e8e6e1;--te:#f8f7f4;--to:#fff;--ib:#fff;--cb:rgba(26,26,46,.06);--cr:rgba(26,26,46,.12);--cv:rgba(26,26,46,.14);--kb:#fff;--ng:#c62828;--po:#2e7d32;--s2:#f0eeea}
body.dark{--bg:#0f0f1a;--bg2:#151525;--tx:#e0dfd8;--tx2:rgba(255,255,255,.45);--bd:rgba(255,255,255,.08);--sh:rgba(0,0,0,.3);--hd:linear-gradient(135deg,#0a0a18,#12122a);--ht:#d0cfc8;--ub:linear-gradient(135deg,#2a2a5a,#1e1e48);--ut:#e0dfd8;--ab:#1e1e32;--at:#e0dfd8;--tb:#12122a;--tt:#b0b0c0;--te:#1a1a2e;--to:#1e1e32;--ib:#1e1e32;--cb:rgba(255,255,255,.06);--cr:rgba(255,255,255,.1);--cv:rgba(255,255,255,.12);--kb:#1e1e32;--ng:#ef5350;--po:#66bb6a;--s2:#16162a}
body{background:var(--bg);color:var(--tx)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:10px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pu{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hd{padding:12px 24px;background:var(--hd);color:var(--ht);display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:10;flex-shrink:0}
.hi{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px}
.htl{font-weight:700;font-size:15px;letter-spacing:-.02em}.hsu{font-size:10px;opacity:.5;margin-top:1px}
.ha{margin-left:auto;display:flex;align-items:center;gap:8px}
.bg{background:rgba(76,175,80,.2);color:#81c784;font-size:9px;padding:3px 8px;border-radius:20px;font-weight:600}
.tg{position:relative;width:40px;height:22px;cursor:pointer}.tg input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:22px;transition:.3s}
.ts::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.ts{background:rgba(124,124,255,.5)}.tg input:checked+.ts::before{transform:translateX(18px)}
.ti{font-size:12px;margin-left:4px}
.ca{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.ms{flex:1;overflow-y:auto;min-height:0;padding:20px 24px;background:linear-gradient(180deg,var(--bg),var(--bg2))}
.mr{display:flex;margin-bottom:16px;animation:fi .3s ease}.mr.u{justify-content:flex-end}.mr.a{justify-content:flex-start}
.av{width:30px;height:30px;border-radius:50%;background:var(--ub);display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;margin-top:2px;box-shadow:0 2px 8px var(--sh);font-size:13px}
.bb{max-width:88%;padding:12px 16px;font-size:13.5px;line-height:1.6}
.bb.u{background:var(--ub);color:var(--ut);border-radius:18px 18px 4px 18px;box-shadow:0 2px 12px var(--sh)}
.bb.a{background:var(--ab);color:var(--at);border-radius:18px 18px 18px 4px;box-shadow:0 1px 6px var(--sh)}
.tw{overflow-x:auto;margin-top:10px;border-radius:8px;border:1px solid var(--bd)}
.tw table{width:100%;border-collapse:collapse;font-size:11.5px;font-variant-numeric:tabular-nums}
.tw th{padding:7px 10px;background:var(--tb);color:var(--tt);font-weight:600;font-size:10.5px;white-space:nowrap}
.tw th:first-child{text-align:left}.tw th:not(:first-child){text-align:right}
.tw td{padding:5px 10px;border-bottom:1px solid var(--bd);white-space:nowrap}
.tw td:first-child{text-align:left;font-weight:500}.tw td:not(:first-child){text-align:right}
.tw tr:nth-child(even){background:var(--te)}.tw tr:nth-child(odd){background:var(--to)}
.tw td.ng{color:var(--ng)}
.xb{display:flex;gap:6px;margin-top:8px}.xn{background:var(--cb);border:1px solid var(--cr);border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer;color:var(--tx);font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:4px}.xn:hover{background:var(--cv)}
.cw{margin-top:10px;border-radius:8px;overflow:hidden;background:var(--kb);border:1px solid var(--bd);padding:12px}.cw canvas{width:100%!important;max-height:200px}
.ch{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px}
.cp{background:var(--cb);border:1px solid var(--cr);border-radius:20px;padding:4px 11px;font-size:11.5px;cursor:pointer;color:var(--tx);transition:all .2s;font-family:inherit}.cp:hover{background:var(--cv)}
.tr{display:flex;align-items:center;gap:10px;margin-bottom:16px;animation:fi .3s ease}
.td{background:var(--ab);border-radius:18px;padding:12px 18px;display:flex;gap:5px}
.dt{width:7px;height:7px;border-radius:50%;background:var(--tx);opacity:.5}
.dt:nth-child(1){animation:pu 1.2s 0s infinite}.dt:nth-child(2){animation:pu 1.2s .15s infinite}.dt:nth-child(3){animation:pu 1.2s .3s infinite}
.ib{padding:12px 20px;background:var(--s2);border-top:1px solid var(--bd);flex-shrink:0}
.iw{display:flex;align-items:center;gap:10px;background:var(--ib);border-radius:24px;padding:5px 7px 5px 16px;box-shadow:0 2px 12px var(--sh);border:1px solid var(--bd)}
.iw input{flex:1;border:none;outline:none;font-size:13.5px;font-family:inherit;background:0 0;color:var(--tx)}
.sb{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#fff;font-size:15px}.sb.on{background:var(--ub);cursor:pointer}.sb.off{background:rgba(128,128,128,.3);cursor:default}
.fn{text-align:center;font-size:9px;color:var(--tx2);margin-top:6px}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.ld .sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--tx);border-radius:50%;animation:sn .8s linear infinite}
@keyframes sn{to{transform:rotate(360deg)}}.ld .lt{font-size:13px;color:var(--tx2)}.ld .le{color:var(--ng);font-size:12px;max-width:450px;text-align:center;line-height:1.6}
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;margin-bottom:6px;letter-spacing:.03em}
.tag.pl{background:rgba(78,121,167,.15);color:#4e79a7}.tag.cu{background:rgba(89,161,79,.15);color:#59a14f}
</style></head>
<body class="light">
<div id="app">
<div class="hd"><div class="hi">📊</div><div><div class="htl">Financial Data Chat</div><div class="hsu" id="hs">Loading...</div></div>
<div class="ha"><label class="tg" title="Dark mode"><input type="checkbox" id="thm" onchange="TT()"/><span class="ts"></span></label><span class="ti" id="thi">🌙</span><div class="bg">● LOCAL</div></div></div>
<div class="ca">
<div class="ld" id="ld"><div class="sp"></div><div class="lt" id="lt">Loading data files...</div></div>
<div class="ms" id="ms" style="display:none"></div>
<div class="ib" id="ib" style="display:none"><div class="iw"><input type="text" id="inp" placeholder="Ask about P&L or customers..."/><button class="sb off" id="sbt" onclick="send()">↑</button></div>
<div class="fn">📊 P&L + 👥 Customer • keyword-driven • no API key</div></div>
</div></div>
<script>
var P={},C={},KW={},CC=0,$m,$i,$b;
function TT(){var d=document.getElementById('thm').checked;document.body.className=d?'dark':'light';document.getElementById('thi').textContent=d?'☀️':'🌙'}
function gc(){var d=document.body.classList.contains('dark');return{g:d?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)',t:d?'#aaa':'#666',c:['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac','#5fa2ce','#fc7d0b','#c85200','#1170aa','#57606c']}}

// ─── Data query helpers for indexed format ───
// P.data[i] = [site_idx, cat_idx, det_idx, date_idx, amount]
// C.data[i] = [site_idx, cust_idx, date_idx, amount]
function pFilter(opts){
  // opts: {sites:[], details:[], cats:[], dates:[]}
  var r=[];var sd={},dd={},cd={},dtd={};
  if(opts.sites)opts.sites.forEach(function(s){var i=P.sites.indexOf(s);if(i>=0)sd[i]=1});
  if(opts.details)opts.details.forEach(function(d){var i=P.details.indexOf(d);if(i>=0)dd[i]=1});
  if(opts.cats)opts.cats.forEach(function(c){var i=P.categories.indexOf(c);if(i>=0)cd[i]=1});
  if(opts.dates)opts.dates.forEach(function(d){var i=P.dates.indexOf(d);if(i>=0)dtd[i]=1});
  var hs=opts.sites&&opts.sites.length,hd=opts.details&&opts.details.length,hc=opts.cats&&opts.cats.length,hdt=opts.dates&&opts.dates.length;
  P.data.forEach(function(d){
    if(hs&&!sd[d[0]])return;if(hc&&!cd[d[1]])return;if(hd&&!dd[d[2]])return;if(hdt&&!dtd[d[3]])return;
    r.push({site:P.sites[d[0]],cat:P.categories[d[1]],det:P.details[d[2]],date:P.dates[d[3]],amt:d[4]});
  });return r;
}
function cFilter(opts){
  var r=[];var sd={},cd={},dtd={};
  if(opts.sites)opts.sites.forEach(function(s){var i=C.sites.indexOf(s);if(i>=0)sd[i]=1});
  if(opts.custs)opts.custs.forEach(function(c){var i=C.customers.indexOf(c);if(i>=0)cd[i]=1});
  if(opts.dates)opts.dates.forEach(function(d){var i=C.dates.indexOf(d);if(i>=0)dtd[i]=1});
  var hs=opts.sites&&opts.sites.length,hc=opts.custs&&opts.custs.length,hdt=opts.dates&&opts.dates.length;
  C.data.forEach(function(d){
    if(hs&&!sd[d[0]])return;if(hc&&!cd[d[1]])return;if(hdt&&!dtd[d[2]])return;
    r.push({site:C.sites[d[0]],cust:C.customers[d[1]],date:C.dates[d[2]],amt:d[3]});
  });return r;
}
function datesForYear(years,pool){return pool.filter(function(d){var y=d.split('-')[0];return years.indexOf(y)!==-1})}

// ─── Init ───
function init(){
  var n=0,errs=[],done=false;
  function ck(){
    n++;document.getElementById('lt').textContent='Loaded '+n+'/3...';
    if(n<3||done)return;
    done=true;
    if(errs.length){document.getElementById('ld').innerHTML='<div style="font-size:40px;margin-bottom:16px">⚠️</div><div class="le"><b>Cannot load:</b><br>'+errs.join('<br>')+'<br><br>Need: <b>pnl.json</b>, <b>customer.json</b>, <b>keyword.json</b><br>in same folder as index.html.<br>Use GitHub Pages or local server.</div>';return}
    // Validate structure
    if(!P.dates||!P.sites||!P.data){errs.push('pnl.json: invalid format (missing dates/sites/data)');document.getElementById('ld').innerHTML='<div style="font-size:40px;margin-bottom:16px">⚠️</div><div class="le">'+errs.join('<br>')+'<br><br>Re-generate pnl.json using convert-pnl.html</div>';return}
    if(!C.dates||!C.sites||!C.data){errs.push('customer.json: invalid format');document.getElementById('ld').innerHTML='<div style="font-size:40px;margin-bottom:16px">⚠️</div><div class="le">'+errs.join('<br>')+'<br><br>Re-generate customer.json using convert-customer.html</div>';return}
    try{
      document.getElementById('hs').textContent=P.dates.length+' months P&L • '+C.customers.length+' customers • '+P.sites.length+' sites';
      document.getElementById('ld').style.display='none';document.getElementById('ms').style.display='block';document.getElementById('ib').style.display='block';
      $m=document.getElementById('ms');$i=document.getElementById('inp');$b=document.getElementById('sbt');
      $i.addEventListener('input',function(){$b.className='sb '+($i.value.trim()?'on':'off')});
      $i.addEventListener('keydown',function(e){if(e.key==='Enter')send()});
      am('a',{text:"Welcome! I'm your **Unified Financial Data Assistant**.\n\n📊 **P&L Data:** "+(P.details||[]).length+" items, "+P.sites.length+" sites, "+P.dates.length+" months ("+P.dates[0]+" to "+P.dates[P.dates.length-1]+")\n👥 **Customer Data:** "+(C.customers||[]).length+" customers, "+C.sites.length+" sites, "+C.dates.length+" months ("+C.dates[0]+" to "+C.dates[C.dates.length-1]+")\n\nAdd **\"customer\"** for customer queries. Add **\"chart\"** for visuals.",
        suggestions:['Revenue Total 2024','Top customer BPA 2023','Salary trend chart','Customer list BPA 2022','Fixed cost SMK01 2024','Gross Profit trend 2023 chart']});
    }catch(e){document.getElementById('ld').innerHTML='<div style="font-size:40px;margin-bottom:16px">⚠️</div><div class="le"><b>Init error:</b> '+e.message+'<br><br>Your JSON files may be in the old format.<br>Re-generate them using the converter tools.</div>'}
  }
  fetch('pnl.json').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(d){P=d;ck()}).catch(function(e){errs.push('pnl.json: '+e.message);ck()});
  fetch('customer.json').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(d){C=d;ck()}).catch(function(e){errs.push('customer.json: '+e.message);ck()});
  fetch('keyword.json').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(d){KW=d;ck()}).catch(function(e){errs.push('keyword.json: '+e.message);ck()});
}

// ─── Helpers ───
function sb(){$m.scrollTop=$m.scrollHeight}
function he(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ft(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(128,128,128,.15);padding:1px 5px;border-radius:3px;font-size:11px">$1</code>').replace(/\n/g,'<br/>')}
function fn(n){if(n==null)return'—';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString(undefined,{maximumFractionDigits:0})}
function fb(n){return n==null?'—':'฿'+fn(n)}
function xcsv(h,r){var c=h.join(',')+'\n';r.forEach(function(w){c+=w.map(function(x){return'"'+String(x).replace(/"/g,'""')+'"'}).join(',')+'\n'});var b=new Blob(['\ufeff'+c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='export.csv';document.body.appendChild(a);a.click();document.body.removeChild(a)}

function am(role,data){
  var row=document.createElement('div');row.className='mr '+(role==='a'?'a':'u');var h='';
  if(role==='a')h+='<div class="av">📊</div>';
  h+='<div class="bb '+(role==='a'?'a':'u')+'">';
  if(data.tag)h+='<div class="tag '+data.tag+'">'+({pl:'📊 P&L Data',cu:'👥 Customer Data'}[data.tag]||'')+'</div>';
  if(data.text)h+='<div>'+ft(data.text)+'</div>';
  if(data.table){h+='<div class="tw"><table><thead><tr>';data.table.headers.forEach(function(x){h+='<th>'+he(x)+'</th>'});h+='</tr></thead><tbody>';
    data.table.rows.forEach(function(r){h+='<tr>';r.forEach(function(c,ci){h+='<td>'+he(c)+'</td>'});h+='</tr>'});
    h+='</tbody></table></div><div class="xb"><button class="xn" data-x="1">📥 CSV</button></div>';
    row.dataset.h=JSON.stringify(data.table.headers);row.dataset.r=JSON.stringify(data.table.rows)}
  if(data.chart){CC++;var cid='c'+CC;h+='<div class="cw"><canvas id="'+cid+'" height="180"></canvas></div>';row.dataset.ci=cid;row.dataset.cc=JSON.stringify(data.chart)}
  if(data.suggestions){h+='<div class="ch">';data.suggestions.forEach(function(s){h+='<button class="cp" data-q="'+he(s)+'">'+he(s)+'</button>'});h+='</div>'}
  h+='</div>';row.innerHTML=h;
  row.querySelectorAll('.cp').forEach(function(b){b.addEventListener('click',function(){send(b.getAttribute('data-q'))})});
  row.querySelectorAll('.xn').forEach(function(b){b.addEventListener('click',function(){xcsv(JSON.parse(row.dataset.h),JSON.parse(row.dataset.r))})});
  $m.appendChild(row);sb();
  if(row.dataset.ci){setTimeout(function(){var cfg=JSON.parse(row.dataset.cc),cc=gc();cfg.options=cfg.options||{};cfg.options.responsive=true;
    cfg.options.plugins=cfg.options.plugins||{};cfg.options.plugins.legend=cfg.options.plugins.legend||{};cfg.options.plugins.legend.labels={color:cc.t,font:{size:10}};
    if(cfg.options.scales){if(cfg.options.scales.x){cfg.options.scales.x.ticks={color:cc.t,font:{size:9}};cfg.options.scales.x.grid={color:cc.g}}
      if(cfg.options.scales.y){cfg.options.scales.y.ticks={color:cc.t,font:{size:9},callback:function(v){return'฿'+fn(v)}};cfg.options.scales.y.grid={color:cc.g}}}
    cfg.data.datasets.forEach(function(ds,i){if(!ds.borderColor&&cfg.type==='line'){ds.borderColor=cc.c[i%15];ds.tension=.3;ds.borderWidth=2;ds.pointRadius=3}
      if(!ds.backgroundColor&&cfg.type==='bar'){ds.backgroundColor=cc.c[i%15];ds.borderRadius=4}});
    new Chart(document.getElementById(row.dataset.ci),cfg)},50)}
}
function showTh(){var e=document.createElement('div');e.className='tr';e.id='thk';e.innerHTML='<div class="av">📊</div><div class="td"><div class="dt"></div><div class="dt"></div><div class="dt"></div></div>';$m.appendChild(e);sb()}
function hideTh(){var e=document.getElementById('thk');if(e)e.remove()}

// ═══ PARSE QUERY ═══
function pq(q){
  q=q.toLowerCase().trim();var tk=q.split(/[\s,;]+/);
  var mo=[],si=[],it=[],cats=[],intent='lookup',wc=false,isCust=false,cm=null;

  // Customer trigger keywords (exact)
  var ct=KW.customer_triggers||{};Object.keys(ct).forEach(function(k){if(em(q,k))isCust=true});

  // Customer name matching — PARTIAL: if user types "koito", match "KOITO MANUFACTURING CO.,LTD."
  var custSearch=null;
  if(!cm&&C.customers){
    // First: exact full name in query (longest match wins)
    C.customers.forEach(function(cn){if(q.indexOf(cn.toLowerCase())!==-1&&(!cm||cn.length>cm.length))cm=cn});
    // Second: partial match — find tokens (4+ chars) that appear inside customer names
    // Min 4 chars prevents "eve","air","pan" from accidentally matching
    if(!cm){
      var skipWords=['revenue','cost','profit','salary','trend','chart','top','list','compare','summary','total',
        'customer','client','jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec',
        'january','february','march','april','june','july','august','september','october','november','december',
        'all','site','how','many','the','for','from','and','what','show','get','give','best','worst',
        'fixed','variable','expense','bonus','welfare','allowance','overtime','insurance','depreciation',
        'repair','maintenance','rental','electric','water','telephone','transport','security','cleaning',
        'highest','lowest','biggest','smallest','ranking','monthly','yearly','quarter','trend','chart','graph'];
      var searchTokens=tk.filter(function(t){return t.length>=4&&!/^20\d{2}$/.test(t)&&skipWords.indexOf(t)===-1});
      if(searchTokens.length>0){
        for(var si2=0;si2<searchTokens.length;si2++){
          var tok=searchTokens[si2];
          var matches=C.customers.filter(function(cn){return cn.toLowerCase().indexOf(tok)!==-1});
          if(matches.length>0&&matches.length<=30){
            custSearch=tok;
            if(matches.length===1)cm=matches[0];
            isCust=true;break;
          }
        }
      }
    }
    if(cm)isCust=true;
  }

  // Months/years
  var km=KW.months||{};
  for(var i=0;i<tk.length;i++){var t=tk[i];
    if(km[t]){var ps=km[t],nx=tk[i+1];
      if(ps[0].length===2&&nx&&/^20\d{2}$/.test(nx)){mo.push(nx+'-'+ps[0]);i++;continue}
      ps.forEach(function(p){if(/^20\d{2}$/.test(p))mo.push(p);else if(p.length===2)mo.push('MM:'+p);else if(/^[QH][1-4]$/.test(p))mo.push(p);else if(/^20\d{2}-\d{2}$/.test(p))mo.push(p)});continue}
    if(/^20\d{2}-\d{2}$/.test(t))mo.push(t);
    if(/^20\d{4}$/.test(t))mo.push(t.slice(0,4)+'-'+t.slice(4))}

  // Sites
  var ks=KW.sites||{};Object.keys(ks).sort(function(a,b){return b.length-a.length}).forEach(function(k){if(em(q,k))ks[k].forEach(function(s){if(si.indexOf(s)===-1)si.push(s)})});

  // Exact Multi-token Match (for P&L items, categories, intents, sites):
  // ALL words in the keyword must appear as exact whole words in the query.
  // Word order doesn't matter: keyword "revenue total" matches query "total revenue 2024"
  // But partial words never match: query "eve" does NOT match keyword "revenue"
  function em(query,kw){
    var kwTk=kw.split(/[\s,;]+/);
    var qTk=query.split(/[\s,;]+/);
    for(var i=0;i<kwTk.length;i++){if(qTk.indexOf(kwTk[i])===-1)return false}
    return true;
  }

  // P&L items & categories — always detect for title display
  var ki=KW.items||{};Object.keys(ki).sort(function(a,b){return b.length-a.length}).forEach(function(k){if(em(q,k))ki[k].forEach(function(n){if(it.indexOf(n)===-1)it.push(n)})});
  if(!isCust){
    var kc=KW.categories||{};Object.keys(kc).sort(function(a,b){return b.length-a.length}).forEach(function(k){if(em(q,k))kc[k].forEach(function(n){if(cats.indexOf(n)===-1)cats.push(n)})});
  }

  // Intents
  var kn=KW.intents||{};Object.keys(kn).sort(function(a,b){return b.length-a.length}).forEach(function(k){if(em(q,k))kn[k].forEach(function(x){if(x==='chart')wc=true;else if(intent==='lookup')intent=x})});
  if(/all/.test(q)&&/month/.test(q))intent='trend';
  if(/list/.test(q)&&/site|item|month|category|customer/.test(q))intent='list';
  if(/how many/.test(q))intent='count';

  // Resolve dates to actual date strings
  var rdates=[];
  var pool=isCust?C.dates:P.dates;
  mo.forEach(function(m){
    if(/^20\d{2}$/.test(m)){pool.forEach(function(d){if(d.startsWith(m+'-')&&rdates.indexOf(d)===-1)rdates.push(d)})}
    else if(m.startsWith('MM:')){var mm=m.slice(3);pool.forEach(function(d){if(d.endsWith('-'+mm)&&rdates.indexOf(d)===-1)rdates.push(d)})}
    else if(/^Q[1-4]$/.test(m)){var qm={Q1:['01','02','03'],Q2:['04','05','06'],Q3:['07','08','09'],Q4:['10','11','12']}[m];pool.forEach(function(d){if(qm.indexOf(d.split('-')[1])!==-1&&rdates.indexOf(d)===-1)rdates.push(d)})}
    else if(/^H[12]$/.test(m)){var hm=m==='H1'?['01','02','03','04','05','06']:['07','08','09','10','11','12'];pool.forEach(function(d){if(hm.indexOf(d.split('-')[1])!==-1&&rdates.indexOf(d)===-1)rdates.push(d)})}
    else if(pool.indexOf(m)!==-1&&rdates.indexOf(m)===-1)rdates.push(m)
  });

  return{dates:rdates.sort(),sites:si,items:it,cats:cats,intent:intent,raw:q,wc:wc,isCust:isCust,cm:cm,cs:custSearch}
}

// ═══ P&L RESPONSE ═══
function grP(p){
  var cc=gc(),si=p.sites,it=p.items,cats=p.cats,dt=p.dates,intent=p.intent,wc=p.wc,raw=p.raw;

  if(intent==='help')return{text:'📊 **P&L:** '+P.details.length+' items, '+P.sites.length+' sites\n👥 **Customer:** '+C.customers.length+' customers\n\nAdd **"customer"** for customer queries.',
    suggestions:['Revenue Total 2024','Salary trend 2023 chart','Top sites by Gross Profit 2024','Fixed cost SMK01 2024','Customer list BPA 2022','Compare 2023 vs 2024']};
  if(intent==='list'){
    if(/site/.test(raw))return{tag:'pl',text:'**P&L Sites ('+P.sites.length+'):**\n'+P.sites.join(', ')};
    if(/item|detail/.test(raw))return{tag:'pl',text:'**Item Details ('+P.details.length+'):**\n'+P.details.join(', ')};
    if(/categor/.test(raw))return{tag:'pl',text:'**Categories:**\n'+P.categories.join(', ')};
    if(/month/.test(raw))return{tag:'pl',text:'**Months ('+P.dates.length+'):**\n'+P.dates.join(', ')};}

  // Query data
  var fOpts={};
  if(si.length)fOpts.sites=si;if(it.length)fOpts.details=it;if(cats.length)fOpts.cats=cats;if(dt.length)fOpts.dates=dt;

  // Guard: if NOTHING was recognized, don't default — show help instead
  var nothingMatched=!it.length&&!cats.length&&!si.length&&!dt.length&&intent==='lookup';
  if(nothingMatched)return{text:'I couldn\'t recognize any keywords in **"'+raw+'"**. Try using exact words like:',
    suggestions:['Revenue Total 2024','Salary SMK01 2023','Gross Profit trend chart','Top sites by Bonus 2024','Fixed cost 2023','Customer Koito 2022','Summary 2024','List items']};

  if(!it.length&&!cats.length)fOpts.details=['Revenue Total'];  // default only when dates or sites matched

  if(intent==='top'||intent==='bottom'){
    var itemName=it.length?it[0]:'Revenue Total';
    var targetDates=dt.length?dt:undefined;
    var rows=pFilter({details:[itemName],dates:targetDates});
    // Pivot: rows=sites, get totals for ranking, then show date columns
    var bySite={};var dateSet={};
    rows.forEach(function(r){if(r.site==='All Site')return;dateSet[r.date]=1;
      if(!bySite[r.site])bySite[r.site]={};bySite[r.site][r.date]=(bySite[r.site][r.date]||0)+r.amt});
    var dates=Object.keys(dateSet).sort();
    var sorted=Object.entries(bySite).sort(function(a,b){
      var ta=0,tb=0;Object.values(a[1]).forEach(function(v){ta+=v});Object.values(b[1]).forEach(function(v){tb+=v});
      return intent==='top'?tb-ta:ta-tb}).slice(0,10);
    var period=targetDates?dt[0]+'~'+dt[dt.length-1]:'all time';
    // If too many date columns (>12), show only Total
    var showDates=dates.length<=12;
    var headers=['Site'].concat(showDates?dates:[]).concat(['Total']);
    var tblRows=sorted.map(function(e){
      var total=0;Object.values(e[1]).forEach(function(v){total+=v});
      if(showDates){var vals=dates.map(function(d){return fb(e[1][d]||0)});return[e[0]].concat(vals).concat([fb(total)])}
      return[e[0],fb(total)]});
    var totals=sorted.map(function(e){var t=0;Object.values(e[1]).forEach(function(v){t+=v});return t});
    var res={tag:'pl',text:'**'+(intent==='top'?'Top':'Bottom')+' sites by '+itemName+'** ('+period+'):',
      table:{headers:headers,rows:tblRows}};
    res.chart={type:'bar',data:{labels:sorted.map(function(e){return e[0]}),datasets:[{label:itemName,data:totals,backgroundColor:cc.c.slice(0,10),borderRadius:4}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{},y:{}}}};
    return res}

  if(intent==='trend'){
    var dets=it.length?it:['Revenue Total'];
    var targetSite=si.length?si:undefined;
    var targetDates=dt.length?dt:P.dates;
    // Pivot: rows=items, cols=dates
    var headers=['Item'].concat(targetDates).concat(['Total']);
    var datasets=[];
    var tblRows=dets.map(function(det){
      var rows=pFilter({details:[det],sites:targetSite,dates:targetDates});
      var byDate={};rows.forEach(function(r){byDate[r.date]=(byDate[r.date]||0)+r.amt});
      var total=0;
      var vals=targetDates.map(function(d){var v=byDate[d]||0;total+=v;return v});
      var label=det+(si.length?' ('+si.join(',')+')':'');
      datasets.push({label:label,data:vals});
      return[det].concat(vals.map(fb)).concat([fb(total)])
    });
    var siteLabel=si.length?' ('+si.join(', ')+')':'';
    var res={tag:'pl',text:'**'+dets.join(' & ')+siteLabel+' trend:**',table:{headers:headers,rows:tblRows}};
    res.chart={type:'line',data:{labels:targetDates,datasets:datasets.map(function(ds,i){return{label:ds.label,data:ds.data,borderColor:cc.c[i%15],backgroundColor:i===0?cc.c[0]+'22':'transparent',fill:i===0}})},options:{scales:{x:{},y:{}}}};
    return res}

  if(intent==='summary'){
    var targetDates=dt.length?dt:P.dates;
    var targetSite=si.length?si:undefined;
    var summaryItems=['Revenue Total','Cost Total','Gross Profit','Operating Profit','Number of staff'];
    var headers=['Item'].concat(targetDates).concat(['Total']);
    var tblRows=summaryItems.map(function(det){
      var rows=pFilter({details:[det],sites:targetSite,dates:targetDates});
      var byDate={};var total=0;
      rows.forEach(function(r){byDate[r.date]=(byDate[r.date]||0)+r.amt;total+=r.amt});
      return[det].concat(targetDates.map(function(d){return fb(byDate[d]||0)})).concat([fb(total)])});
    var label=si.length?si.join(', '):'All Sites';
    return{tag:'pl',text:'**Summary for '+label+'** ('+targetDates[0]+' to '+targetDates[targetDates.length-1]+'):',table:{headers:headers,rows:tblRows}}}

  // Default lookup — PIVOT: rows=items or sites, columns=dates
  var rows=pFilter(fOpts);
  if(!rows.length)return{tag:'pl',text:'No P&L data found for this query. Try: `Revenue Total 2024` or `list items`'};

  // Determine pivot dimensions
  var uniqueDates=[], uniqueItems=[], uniqueSites=[];
  var ds={},is={},ss={};
  rows.forEach(function(r){
    if(!ds[r.date]){ds[r.date]=1;uniqueDates.push(r.date)}
    if(!is[r.det]){is[r.det]=1;uniqueItems.push(r.det)}
    if(!ss[r.site]){ss[r.site]=1;uniqueSites.push(r.site)}
  });
  uniqueDates.sort(); uniqueItems.sort(); uniqueSites.sort();

  // Pivot by: if multiple items → rows=items, cols=dates
  //           if single item + multiple sites → rows=sites, cols=dates
  var pivotRows, pivotKey, headers;
  if(uniqueItems.length>1 || uniqueSites.length<=1){
    // Rows = items, aggregate across sites
    pivotRows=uniqueItems; pivotKey='det';
    var agg={};rows.forEach(function(r){var k=r.det+'|'+r.date;agg[k]=(agg[k]||0)+r.amt});
    headers=['Item'].concat(uniqueDates).concat(['Total']);
    var tblRows=uniqueItems.map(function(item){
      var total=0;
      var vals=uniqueDates.map(function(d){var v=agg[item+'|'+d]||0;total+=v;return fb(v)});
      return[item].concat(vals).concat([fb(total)])
    });
  } else {
    // Rows = sites, single item
    var itemName=uniqueItems[0];
    var agg={};rows.forEach(function(r){var k=r.site+'|'+r.date;agg[k]=(agg[k]||0)+r.amt});
    headers=['Site'].concat(uniqueDates).concat(['Total']);
    var tblRows=uniqueSites.map(function(site){
      var total=0;
      var vals=uniqueDates.map(function(d){var v=agg[site+'|'+d]||0;total+=v;return fb(v)});
      return[site].concat(vals).concat([fb(total)])
    });
  }
  var siteLabel2=si.length?' ('+si.join(', ')+')':'';
  var period=dt.length?' ('+uniqueDates[0]+' ~ '+uniqueDates[uniqueDates.length-1]+')':'';
  return{tag:'pl',text:'**'+(it.length?it.join(', '):'P&L results')+siteLabel2+'**'+period+':',table:{headers:headers,rows:tblRows}}
}

// ═══ CUSTOMER RESPONSE ═══
function grC(p){
  var cc=gc(),si=p.sites,dt=p.dates,intent=p.intent,cm=p.cm,cs=p.cs,wc=p.wc,raw=p.raw,it=p.items;
  var itL=it.length?it.join(', ')+' - ':'';

  // Resolve partial search to matching customer names
  var matchedCusts=null;
  if(cm){matchedCusts=[cm]}
  else if(cs){matchedCusts=C.customers.filter(function(cn){return cn.toLowerCase().indexOf(cs)!==-1})}

  if(intent==='count'){
    var rows=cFilter({sites:si.length?si:undefined,dates:dt.length?dt:undefined});
    var u={};rows.forEach(function(r){u[r.cust]=1});
    return{tag:'cu',text:'**'+itL+Object.keys(u).length+' customers** '+(si.length?'at '+si.join(', '):'')+(dt.length?' ('+dt[0]+'~'+dt[dt.length-1]+')':'')}}

  if(intent==='list'){
    var rows=cFilter({sites:si.length?si:undefined,dates:dt.length?dt:undefined});
    var byKey={},yearSet={};
    rows.forEach(function(r){var y=r.date.split('-')[0];yearSet[y]=1;
      if(!byKey[r.cust])byKey[r.cust]={};byKey[r.cust][y]=(byKey[r.cust][y]||0)+r.amt});
    var years=Object.keys(yearSet).sort();
    var sorted=Object.entries(byKey).sort(function(a,b){
      var ta=0,tb=0;Object.values(a[1]).forEach(function(v){ta+=v});Object.values(b[1]).forEach(function(v){tb+=v});return tb-ta});
    var headers=['Customer'].concat(years).concat(['Total']);
    var tblRows=sorted.slice(0,20).map(function(e){
      var total=0;var vals=years.map(function(y){var v=e[1][y]||0;total+=v;return fb(v)});
      return[e[0]].concat(vals).concat([fb(total)])});
    return{tag:'cu',text:'**'+itL+'Customers** '+(si.length?'at '+si.join(', '):'')+(dt.length?' ('+dt[0]+'~'+dt[dt.length-1]+')':'')+' (top 20 of '+sorted.length+'):',
      table:{headers:headers,rows:tblRows}}}
  if(intent==='top'||intent==='bottom'){
    var rows=cFilter({sites:si.length?si:undefined,dates:dt.length?dt:undefined});
    var byKey={},yearSet={};
    rows.forEach(function(r){if(r.cust==='All Customer')return;var y=r.date.split('-')[0];yearSet[y]=1;
      if(!byKey[r.cust])byKey[r.cust]={};byKey[r.cust][y]=(byKey[r.cust][y]||0)+r.amt});
    var years=Object.keys(yearSet).sort();
    var sorted=Object.entries(byKey).sort(function(a,b){
      var ta=0,tb=0;Object.values(a[1]).forEach(function(v){ta+=v});Object.values(b[1]).forEach(function(v){tb+=v});
      return intent==='top'?tb-ta:ta-tb}).slice(0,10);
    var headers=['Customer'].concat(years).concat(['Total']);
    var tblRows=sorted.map(function(e){
      var total=0;var vals=years.map(function(y){var v=e[1][y]||0;total+=v;return fb(v)});
      return[e[0]].concat(vals).concat([fb(total)])});
    var totals=sorted.map(function(e){var t=0;Object.values(e[1]).forEach(function(v){t+=v});return t});
    var res={tag:'cu',text:'**'+itL+(intent==='top'?'Top':'Bottom')+' 10 customers** '+(si.length?'at '+si.join(', '):'')+':',
      table:{headers:headers,rows:tblRows}};
    res.chart={type:'bar',data:{labels:sorted.map(function(e){return e[0].length>25?e[0].slice(0,25)+'…':e[0]}),datasets:[{label:'Revenue',data:totals,backgroundColor:cc.c.slice(0,10),borderRadius:4}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{},y:{}}}};
    return res}

  if(intent==='trend'){
    var filt=matchedCusts?{custs:matchedCusts}:{};if(si.length)filt.sites=si;
    var rows=cFilter(filt);
    // Pivot: if matched custs, rows=customers cols=year-months; else single row
    var byDate={};rows.forEach(function(r){byDate[r.date]=(byDate[r.date]||0)+r.amt});
    var dates=Object.keys(byDate).sort();
    var label=cm||(cs?'"'+cs+'" ('+matchedCusts.length+' matches)':'All customers');if(si.length)label+=' at '+si.join(', ');
    // Group by year for wide format
    var byYear={};dates.forEach(function(d){var y=d.split('-')[0];byYear[y]=(byYear[y]||0)+byDate[d]});
    var years=Object.keys(byYear).sort();
    var headers=['Customer'].concat(years).concat(['Total']);
    var grandTotal=0;years.forEach(function(y){grandTotal+=byYear[y]});
    var tblRows=[[label].concat(years.map(function(y){return fb(byYear[y])})).concat([fb(grandTotal)])];
    var res={tag:'cu',text:'**'+itL+label+' trend:**',table:{headers:headers,rows:tblRows}};
    res.chart={type:'line',data:{labels:dates,datasets:[{label:'Revenue',data:dates.map(function(d){return byDate[d]}),borderColor:cc.c[4],backgroundColor:cc.c[4]+'22',fill:true}]},options:{scales:{x:{},y:{}}}};
    return res}

  if(matchedCusts&&matchedCusts.length>0){
    var rows=cFilter({custs:matchedCusts,sites:si.length?si:undefined,dates:dt.length?dt:undefined});
    if(!rows.length)return{tag:'cu',text:'No data found for **'+(cm||cs)+'**'};
    // Pivot: rows=customers, cols=years
    var byKey={},yearSet={};
    rows.forEach(function(r){var y=r.date.split('-')[0];var k=r.cust;yearSet[y]=1;
      if(!byKey[k])byKey[k]={};byKey[k][y]=(byKey[k][y]||0)+r.amt});
    var years=Object.keys(yearSet).sort();
    var headers=['Customer'].concat(years).concat(['Total']);
    var sorted=Object.entries(byKey).sort(function(a,b){
      var ta=0,tb=0;Object.values(a[1]).forEach(function(v){ta+=v});Object.values(b[1]).forEach(function(v){tb+=v});return tb-ta});
    var tblRows=sorted.slice(0,30).map(function(e){
      var total=0;var vals=years.map(function(y){var v=e[1][y]||0;total+=v;return fb(v)});
      return[e[0]].concat(vals).concat([fb(total)])});
    var title=cm?'**'+itL+cm+':**':'**'+itL+'Customers matching "'+cs+'" ('+sorted.length+'):**';
    var period=dt.length?' ('+dt[0]+'~'+dt[dt.length-1]+')':'';
    return{tag:'cu',text:title+period,table:{headers:headers,rows:tblRows}}}

  // Default — pivot: rows=customers, cols=years
  var rows=cFilter({sites:si.length?si:undefined,dates:dt.length?dt:undefined});
  if(!rows.length)return{tag:'cu',text:'No customer data found.'};
  var byKey={},yearSet={};
  rows.forEach(function(r){if(r.cust==='All Customer')return;var y=r.date.split('-')[0];yearSet[y]=1;
    if(!byKey[r.cust])byKey[r.cust]={};byKey[r.cust][y]=(byKey[r.cust][y]||0)+r.amt});
  var years=Object.keys(yearSet).sort();
  var sorted=Object.entries(byKey).sort(function(a,b){
    var ta=0,tb=0;Object.values(a[1]).forEach(function(v){ta+=v});Object.values(b[1]).forEach(function(v){tb+=v});return tb-ta});
  var headers=['Customer'].concat(years).concat(['Total']);
  var tblRows=sorted.slice(0,15).map(function(e){
    var total=0;var vals=years.map(function(y){var v=e[1][y]||0;total+=v;return fb(v)});
    return[e[0]].concat(vals).concat([fb(total)])});
  return{tag:'cu',text:'**'+itL+'Customer revenue** '+(si.length?'at '+si.join(', '):'')+(dt.length?' ('+dt[0]+'~'+dt[dt.length-1]+')':'')+':',
    table:{headers:headers,rows:tblRows}}
}

function send(text){var q=(text||$i.value).trim();if(!q)return;$i.value='';$b.className='sb off';am('u',{text:q});showTh();
  setTimeout(function(){hideTh();var p=pq(q);am('a',p.isCust?grC(p):grP(p))},300+Math.random()*300)}
init();
</script></body></html>
